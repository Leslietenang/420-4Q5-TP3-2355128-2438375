services:
  reverseProxy:
    image: nginx:latest
    container_name: reverseProxyTP
    ports: 
      - 8080:80
    volumes:
      - ./reverseProxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - frontend


  app:
    image: wordpress:latest
    container_name: WordPressApp
    networks:
      - frontend
      - backend
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - db

    env_file: 
      - .env
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      #WORDPRESS_CONFIG_EXTRA: |
        #define('WP_HOME', 'http://localhost:81');
        #define('WP_SITEURL', 'http://localhost:81');

 
  db:
    image: mysql:latest
    container_name: db_mysql
  
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    networks:
      - backend

  maintenance:
    container_name: maintenance
    build: ./maintenance
    volumes:
      - wp_data:/backup/wordpress
      - db_data:/backup/db
      - ./archive:/archives
      - ~/.ssh:/root/.ssh:ro
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      - app
      - db


volumes:
  db_data:
  wp_data:
networks:
  frontend:
  backend: